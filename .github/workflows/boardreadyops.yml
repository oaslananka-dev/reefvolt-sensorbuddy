name: BoardReadyOps

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  smoke:
    name: boardreadyops / smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run BoardReadyOps
        uses: oaslananka/boardreadyops@main
        with:
          config: boardreadyops.yml
          mode: warn
          fail-on: critical

      - name: Upload BoardReadyOps reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: boardreadyops-report
          path: |
            build/boardreadyops.*
          if-no-files-found: warn
