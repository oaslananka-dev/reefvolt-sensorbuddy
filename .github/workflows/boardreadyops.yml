name: BoardReadyOps

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  smoke:
    name: boardreadyops / smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install KiCad 10
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-10.0-releases
          sudo apt-get update -qq
          sudo apt-get install --yes kicad
          kicad-cli version

      - name: Run BoardReadyOps
        uses: oaslananka/boardreadyops@84d77e288cf43fa1c5ea680d0d3241b38afb1110
        with:
          config: boardreadyops.yml
          mode: warn
          fail-on: critical
          require-kicad: true
